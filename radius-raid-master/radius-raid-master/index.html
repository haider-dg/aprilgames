<!doctype html>
<html>

<head>
	<title>Radius Raid</title>
	<link rel="shortcut icon" id="favicon" />

	<style>
		body {
			background: #080808;
		}

		#wrap {
			background: #222;
			box-shadow: inset 0 0 0 1px #404040, 0 0 0 1px #000;
			left: 50%;
			opacity: 0;
			padding: 10px;
			position: absolute;
			top: 50%;
			transition: opacity 1.5s;
		}

		.loaded #wrap {
			opacity: 1;
		}

		#wrap-inner {
			background: #000;
			overflow: hidden;
			position: relative;
		}

		canvas {
			cursor: crosshair;
			display: block;
			left: 0;
			position: absolute;
			top: 0;
		}

		#logo-overlay {
			position: absolute;
			top: 10px;
			left: 10px;
			z-index: 1000;
			pointer-events: none;
		}

		#sound-toggle {
			position: absolute;
			top: 10px;
			right: 10px;
			z-index: 1001;
			cursor: pointer;
			background: rgba(0, 0, 0, 0.5);
			border: 1px solid #444;
			padding: 5px;
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.2s;
		}

		#sound-toggle:hover {
			background: rgba(50, 50, 50, 0.8);
		}

		#sound-toggle svg {
			width: 24px;
			height: 24px;
			fill: #fff;
		}
	</style>
</head>

	<script>
		var bgMusic = document.getElementById('bgMusic');
		var soundToggle = document.getElementById('sound-toggle');
		var soundIcon = document.getElementById('sound-icon');

		var speakerSVG = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';

		bgMusic.volume = 0.5;

		soundToggle.addEventListener('mousedown', function(e) {
			e.stopPropagation();
			$.mute = !$.mute;
			bgMusic.muted = $.mute;
			soundIcon.innerHTML = $.mute ? mutedSVG : speakerSVG;
		});

		var playMusic = function() {
			bgMusic.play().catch(function(e) {
				console.log('Audio play failed:', e);
			});
			window.removeEventListener('mousedown', playMusic);
			window.removeEventListener('keydown', playMusic);
			window.removeEventListener('touchstart', playMusic);
		};
		window.addEventListener('mousedown', playMusic);
		window.addEventListener('keydown', playMusic);
		window.addEventListener('touchstart', playMusic);
	</script>
